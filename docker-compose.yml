version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Mount the Docker daemon socket so the container can execute sandbox containers on the host
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent volume for cookies and local sqlite DB
      - ./cookies:/workspace/cookies
      - ./data:/workspace/data
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite+aiosqlite:////workspace/data/codechef_mcp.db
    env_file:
      - .env
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
